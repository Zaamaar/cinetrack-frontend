<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineTrack — Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toast" class="toast"></div>

<nav class="nav">
  <div class="nav-inner">
    <span class="logo">CINE<span class="logo-accent">TRACK</span></span>
  </div>
</nav>

<section id="hero" class="hero">
  <div class="hero-inner">
    <p class="eyebrow">A watchlist that actually remembers</p>
    <h1 class="hero-title">Track every watch.<br>Rate every story.</h1>
    <p class="hero-sub">No feed, no algorithm — just your list.</p>
  </div>
  <div class="hero-strip" aria-hidden="true"></div>
</section>

<section class="auth-section">
  <div class="auth-card">
    <div class="auth-card-header">
      <h2>Create your account</h2>
      <p class="auth-switch">Already have one? <a href="index.html">Log in</a></p>
    </div>

    <form id="registerForm" class="auth-form">
      <label>Email
        <input type="email" name="email" required autocomplete="email">
      </label>
      <label>Password
        <input type="password" name="password" required minlength="8" autocomplete="new-password">
        <span class="field-hint">At least 8 characters</span>
      </label>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>
  </div>
</section>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
</body>
</html>
